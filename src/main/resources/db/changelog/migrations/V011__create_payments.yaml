databaseChangeLog:
  - changeSet:
      id: V011-create-payments
      author: emekachukwulobe
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: booking_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_payments_booking
                    references: bookings(id)
              - column:
                  name: tenant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(15, 2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: VARCHAR(3)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: method
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: provider_reference
                  type: VARCHAR(255)
                  constraints:
                    unique: true
              - column:
                  name: provider
                  type: VARCHAR(50)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - createIndex:
            tableName: payments
            indexName: idx_payments_booking_id
            columns:
              - column:
                  name: booking_id
        - createIndex:
            tableName: payments
            indexName: idx_payments_provider_reference
            columns:
              - column:
                  name: provider_reference
