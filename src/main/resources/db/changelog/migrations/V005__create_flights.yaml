databaseChangeLog:
  - changeSet:
      id: V005-create-flights
      author: system
      changes:
        - createTable:
            tableName: flights
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_flights_tenant
                    references: tenants(id)
              - column:
                  name: flight_number
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: origin
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: destination
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: departure_time
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: arrival_time
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: SCHEDULED
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - createIndex:
            tableName: flights
            indexName: idx_flights_tenant_id
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            tableName: flights
            indexName: idx_flights_origin_destination
            columns:
              - column:
                  name: origin
              - column:
                  name: destination
        - createIndex:
            tableName: flights
            indexName: idx_flights_departure_time
            columns:
              - column:
                  name: departure_time
