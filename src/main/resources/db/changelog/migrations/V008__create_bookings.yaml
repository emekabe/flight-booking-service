databaseChangeLog:
  - changeSet:
      id: V008-create-bookings
      author: system
      changes:
        - createTable:
            tableName: bookings
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_bookings_tenant
                    references: tenants(id)
              - column:
                  name: booking_reference
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: flight_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_bookings_flight
                    references: flights(id)
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_bookings_user
                    references: users(id)
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: PENDING
                  constraints:
                    nullable: false
              - column:
                  name: expiration_time
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - createIndex:
            tableName: bookings
            indexName: idx_bookings_tenant_id
            columns:
              - column:
                  name: tenant_id
        - createIndex:
            tableName: bookings
            indexName: idx_bookings_booking_reference
            columns:
              - column:
                  name: booking_reference
        - createIndex:
            tableName: bookings
            indexName: idx_bookings_status_expiration
            columns:
              - column:
                  name: status
              - column:
                  name: expiration_time
