databaseChangeLog:
  - changeSet:
      id: V002-create-tenant-configs
      author: emekachukwulobe
      changes:
        - createTable:
            tableName: tenant_configs
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tenant_configs_tenant
                    references: tenants(id)
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: value
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: tenant_configs
            columnNames: tenant_id, name
            constraintName: uq_tenant_configs_tenant_name
        - createIndex:
            tableName: tenant_configs
            indexName: idx_tenant_configs_tenant_id
            columns:
              - column:
                  name: tenant_id
