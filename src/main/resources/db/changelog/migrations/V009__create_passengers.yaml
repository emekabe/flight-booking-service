databaseChangeLog:
  - changeSet:
      id: V009-create-passengers
      author: system
      changes:
        - createTable:
            tableName: passengers
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: booking_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_passengers_booking
                    references: bookings(id)
              - column:
                  name: tenant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: passport_number
                  type: VARCHAR(50)
              - column:
                  name: date_of_birth
                  type: DATE
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - createIndex:
            tableName: passengers
            indexName: idx_passengers_booking_id
            columns:
              - column:
                  name: booking_id
