databaseChangeLog:
  - changeSet:
      id: V004-create-password-histories
      author: system
      changes:
        - createTable:
            tableName: password_histories
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_password_histories_user
                    references: users(id)
              - column:
                  name: tenant_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_password_histories_tenant
                    references: tenants(id)
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
        - createIndex:
            tableName: password_histories
            indexName: idx_password_histories_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: password_histories
            indexName: idx_password_histories_tenant_id
            columns:
              - column:
                  name: tenant_id
